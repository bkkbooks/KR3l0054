body:
  text: 墨客揮犀卷五宋彭乗撰詩云螟蛉有子蜾臝負之陶𨼆居以謂蜾臝自生子如粟粒捕取螟蛉者所以飼其子非以螟蛉為子也余童稚時屢驗之陶説誠不妄其類有三銜泥營巢扵室壁間者名蜾臝穴地為巢者名蠮螉窠扵書卷或筆管中者名蒲盧名既不同其質狀小大亦異蜾臝蒲盧即捕桑蠖及小蜘蛛之類蠮螉唯捕蠨蛸與蟋蟀耳捕得皆螫殺去其足盡寘穴中生子其上旋以泥隔之旬日子大成蜂能飛而諸蟲盡矣蝗一生九十九子皆聮綴而下入地常深寸許至春暖始生初出如􅁞五日而􅀎躍十日而能飛喜旱而畏雪雪多則入地愈深不復􅀎出蝗為人掩捕飛起蔽天或墜陂湖間多化為魚蝦有漁人扵湖側置網蝗墜壓網至沒漁輙有喜色明日舉網得蝦數斗水蛭性難死予同官林承奉常言少時曽取大水蛭曝為乾數月後投水椀中復生又以為末散水中悉化為小水蛭有人夜臨溪而溷蛭入其尻中數年瘦病而死其家將殮蛭自亡者口中擁出至數升而止東南之美有㑹稽之竹箭竹為竹箭為箭盖二物也今採箭以為矢而通謂矢為箭者因其材名之也至於用木為箭而謂之箭則謬矣丁晉公之逐士大夫逺嫌莫敢與之通聲問一日忽有一書與執政執政得之不敢發立具上聞洎發之乃表也深自叙致詞頗哀切其間兩句曰雖􅁶陵之罪大念立主之功多遂有北還命謂多智變以流人無因達章奏遂託為執政書度以上聞因蒙寛宥唐華清宫今靈泉觀也七聖殿之西南隅十數步間有皂莢一株合數人抱枝榦頗瘁相傳云明皇洎貴妃共植於此毎嵗結實必有十數莢合懽者京兆尹命老卒數人守視之移接于他枝則不復合懽也蟲之類能入耳者不獨蚰蜒如壁虱螢火叩頭蟲皂莢蟲皆能入耳為害余有外親曽為蟲入耳自謂必死乃極其家所有恣情耗蕩凡數年家業遂破蟲出疾愈驗之乃叩頭蟲也又余從祖多患腹痛類為蟲所食或教之以桃葉為枕一夕蟲自鼻出形如鷹觜人莫識其名者有人為蚰蜒入耳遇其極時不覺以頭撞柱至血流不知云痒甚不可忍蚰蜒入耳往往食髓至冬又能滋生凡蟲入耳者惟用生油灌之為妙有蟲狀如蟬形小而匾好𨼆扵屋壁及書䇿中前有兩長足如蟹螯觸後則旁行觸前則却行有鄭房秀才因掲䇿見之不知其有毒也戲以手指再三撥之欲觀其行或為所螫痛卧數日遇良醫治之得愈醫云此名惡蝨不治殺人凡夜食必以燭余一夕大醉渇甚取水將飲聞水中有聲急呼燭觀之得一蟲狀如蚯蚓細而長問左右曰水蠱蟲也入腹中食人腸胃段成式酉陽雜爼記事多誕其間叙草木異物尤多謬妄率記異國所出欲無根柢如云一木五香根旃檀節沈香花雞舌葉藿膠熏陸此甚謬旃檀與沈水兩木無異鷄舌即今丁香耳今藥品中所用者亦非藿香自是草葉南方多有熏陸小木而大葉海南亦有熏陸乃其謬也今謂之乳頭香五物迥殊元非同類也黄宗旦晩年病目毎奏事先具奏自成誦于口至上前展奏自誦之其實不見也同列害之宻以他書易其奏目宗旦不知也至上前所誦與奏目不同歸方覺之遂乞致仕蔡子正久在邊任晩年以龍圖閣直學士再守平涼作喜􅁶鶯辭一闋以自廣曰霜天清曉望紫塞古木寒雲衰草溪馬嘶風邊鴻翻月隴上鐵衣寒早欲歌倚曲悲壯盡道君恩湏報塞垣樂盡路鞬錦領山西年少談笑刁斗静烽火一把長報平安耗聖主憂邊威懐遐方關塞且寛天討嵗華向晩愁思誰念玉闗人老太平也且歡娱湏把金樽頻倒此曲成大傳都下嶺南有異蟲如蚯蚓長尺餘觜利如錐多夜出半身著地半指空而行或有誤觸之者直入人心腹食人至死乃出土人目之為夜虎甚畏避之蜣蜋夜飛宜避之撞入胸腹或臂股間輙遺子而去人或不悟子漸隐入肉中為患生股臂間者猶可傳療若入心腹則不可治也長安道中有行人倦息古松之下回視巨蟒蛇長丈餘宛轉荆􅁄間若傷病者行者怪而諦視之但見腦門上蟲大如粟粒色紅如丹因取置地以足􅝌之逡巡蛇遂能去行者漸覺足間微癢湏臾愈劇毒氣俄升扵股旬日之間血肉潰爛遂墜股而死細微之物其毒至是人終莫知其名李溥為江淮發運使毎嵗奏計則以大船載東南美貨結納當途莫知紀極章獻太后垂簾時溥因奏事盛稱浙茶之美云自来進御惟建州餅茶而浙茶未嘗修貢夲司以羨餘錢買到數千斤乞進入内自國門挽船而入稱進奉茶綱有司不敢問所貢餘者悉入私室溥晩年以賄敗竄謫海州然自此遂為發運司嵗例毎發運使入奏舶艫蔽江自泗州七日至京余出使淮南時見有重載入汴者購得其籍言兩浙牋紙三船他物稱是漢以宫殿多灾術者言天上有魚尾星宜為其𧰼冠于室以禳之今自有唐以来寺觀舊殿宇尚有為飛魚形尾指上者不知何時易名為鴟吻狀亦不類魚尾蘇伯材奉議云凡欲松偃盖極不難栽時當去松中大根惟留四旁􅂡根則無不偃盖壺山有栢木一株長數尺半化為石半猶是堅木蔡君謨見而異焉因運置私第余莆陽日親見之菌不可妄食建寜縣山石間忽生一菌大如車盖鄉民異之取以為􅄿食者輙死凡菌為羮照人無影者不可食食殺人又有菌樷生扵朽木或糞壤上其形如瑞芝潔白可愛夜則有光可以鑑物江南陳彭年博學書史扵禮文尤所詳練歸朝日侍從朝廷郊廟禮儀多委彭年裁定援引故事頗為詳洽嘗攝太常卿𨗳駕悮行黄道上有司止之彭年正色回顧曰自有典故禮曹素畏其該洽不復敢詰問李獻臣好為雅言曽知鄭州時孫次公為陜漕罷赴闕先遣一使召入京所遣乃獻臣故吏到鄭廷㕘獻臣甚喜欲令左右延飯乃問之曰餐來未使臣誤意餐者謂次公也遽對曰離長安日都運待制已治裝獻臣曰不問孫待制官人餐來未其人慙沮而言曰不敢仰昧為三司軍將日曽乞却十三盖鄙語謂􅇜杖為餐獻臣掩口曰官人誤也問曽與未曽餐正欲奉留一食耳至和中余赴任邕至金城驛郵置早膳聞如以手荅腰鼓者問郵卒曰何處作樂曰非也乃鴆鳥禁虵凌霄花金錢花渠那異花皆有毒不可近眼有人仰視凌霄花露滴眼中後遂失明楊梅皂角木皆有雌雄雄者不實鑿木榦作方寸穴取雌木填之乃實銀杏葉如鴨脚獨窠者不實偶生及樷生者乃實墨客揮犀卷五
