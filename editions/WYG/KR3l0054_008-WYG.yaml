  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0054_WYG_008-1a, image: WYG1037/WYG1037-0704c.png}
body:
  text: 墨客揮犀卷八宋彭乗撰許懷德為殿帥嘗有一舉人因懷德乳姥求為門客懷德許之舉子曵襕拜于庭下懷德據坐受之人謂懷德武人不知事體宻謂之曰舉人無沒堦之禮只少降接也懷德應之曰我得打乳姥關節秀才只消如此待之唐詩有曰長因送人處憶得别家時又曰舊國别多日故人無少年而舒王東坡用其意作古今不經人道語舒王詩曰木末北山烟冉冉草根南澗水泠泠繰成白雪桑重緑割盡黄雲稻正青東坡曰春畦雨過羅紈膩夏隴風來餅餌香如華嚴經舉果知因譬如蓮華方其吐花而果具蘂中造語之工至於舒王東坡山谷盡古今之變舒王曰江水轉空為白晝嶺雲分瞑與黄昏又曰一水護田將緑遶兩山排闥送青來東坡海棠詩曰只恐夜深花睡去髙燒銀燭照紅粧又曰我攜此石歸袖中有東海山谷曰此皆謂之句中眼學者不知此妙韻終不勝古之石刻存于今者惟石鼓也本露出于野司馬池待制知鳳翔府日輦置于府學之門廡下外以木櫺護之其石質堅頑𩔖今人馬碓磑者古篆刻缺辨者幾希范文正公幼孤隨母再適朱氏公性至孝以母在時方貧及顯非賔客不重味妻子僅能自充然好施與所得俸禄盡置義庄以贍宗屬泛愛樂善故雖里巷之人亦知公之姓字蔡君謨議茶者莫敢對公發言建茶所以名重天下由公也後公製小團其品尤精於大團一日福唐蔡葉丞祕教召公啜小團坐久復有一客至公啜而味之曰非獨小團必有大團雜之丞驚呼童曰本碾造二人茶繼有一客至造不及乃以大團兼之丞神服公之明審石曼卿居蔡河下曲鄰有一豪家日聞歌鐘之聲其家僮僕數十人常徃來曼卿之門曼卿呼一僕問豪為何人對曰姓李氏主人方二十嵗並無昆弟家妾曵羅綺者數十人曼卿求欲見之其人曰郎君素未嘗接士大夫他人必不可見然喜飲酒屢言聞學士能飲酒意亦似欲相見待試之一日果使人延曼卿曼卿即著帽徃見之坐于堂上久之方出主人著頭巾繫勒帛不具衣冠見曼卿全不知拱揖之禮引曼卿入一别館供帳赫然坐良久有二鬟妾各持一小槃至曼卿前槃中紅牙牌十餘其一槃是酒凡十餘品令曼卿擇一牌其一槃肴饌各令擇五品既而二鬟去有羣妓十餘人各執肴果樂噐粧服人品皆艷麗粲然一妓酌酒以進酒罷羣妓執果肴者萃立其前食罷則分列其左右京師人謂之軟盤酒五行羣妓皆退主人者亦翩然而去畧不揖客曼卿獨步而出曼卿言豪者之情狀懵然愚癡不分菽麥而奉養如此極可怪也他日試使人通鄭重則閉門不納亦無應門者問其近鄰云其人未嘗與人徃還雖鄰家亦不識面古人謂之錢癡信有之杜德俗呼為杜麻胡送鋪中卒也附郵筒物至重者他卒莫當之德即荷而去曾不倦怠一日醉牽一虎臥於鋪前居人大驚德即枕而寐食久方起解縳縱虎而去試訶之曰復歸舊山不得害人虎瞑目若􅃪伏者乃去人始以此異之數日後典衣召等輩環坐共飲曰德性根好道宿業所牽未能脱去乃此拘留近因引虎幾泄神妙吾非久去矣汝等善勤王事無生怠忽各宜保育翌日德果死德惟一身乃塟路傍治平年大雨水泛濫横流德墓壞浮其屍出外為耕夫立其屍於路傍爪髮鬚眉皆不墮叩之蓬蓬若空革有識者復塟之亦是異人也程丞相性嚴毅無所推下出鎮大名毎晨起據案决事左右皆惴恐無敢喘息及開宴召寮佐飲酒則笑歌歡謔釋然無間於是人畏其剛果而樂其曠逹桑贊以旄節鎮邢城張文節居幕下例以幕職每月料入十五千以文節家貧食甚衆命倍給之文節亦止取其半或不得已過有所用即其所用之因聞于桑歸其餘于帑藏桑贊雖武人嘗謂文節曰公異日必大用恨吾老不得見也祥符中文節為京東轉運使奏稱昔在桑贊幕下知臣長厚今贊死塟洪州子弟悉官於外臣乞毎遇寒食節至贊墓拜掃詔可之是後嵗一徃祭奉之禮如在日在相府凡桑氏子孫來見者待之有如骨肉解叔謙母有疾叔謙夜於庭中稽顙祈福聞空中語云此病得丁公藤為酒即瘥即訪醫及本草注皆無識者乃求訪至宜都郡遇見山中一老翁伐木問其所用答云此丁公藤療風尤驗叔謙便拜伏流涕具言來意此公愴然以四段與之并示以漬酒法叔謙受之顧視此人不復知處依法為酒母病即瘥魏舒嘗詣野店主人妻夜産俄而聞車馬之聲相問者男也女也曰男年之十五以兵死復問寢者為誰曰魏公舒後十五載詣主人問所生兒何在曰因條桑為斧傷而死舒自知當為公矣後果為三公蕭叡明母病風積年沈臥叡明晝夜祈禱時寒叡明下淚為之氷如筯額上叩頭血亦氷不溜忽有一人以小石函授之曰此療夫人病叡明跪受之忽不見以函奉母函中唯有三寸絹丹書為日月字母服之即平復于時秣陵朱緒無行母病積年忽思菰􅅅緒妻到市買菰為􅅅欲奉母緒曰病後安能食先嘗之遂併食盡母怒曰我病欲此􅅅汝何必併啖盡天若有知當令汝哽死緒便聞心中介介然即痢血明日而死叡明聞之欲手自戮其屍既而曰汚吾刀乃止李預得古人餐玉法乃採訪藍田躬徃攻掘得若環璧雜噐形者大小百餘預乃椎七十枚為屑食之及疾篤謂妻子曰吾尸體必當有異勿速殯令後人知餐法之妙時七月中旬長安毒熱預停屍四宿而體色不變其妻常氏以玉珠二枚含之口閉常謂曰君自云餐玉有神驗何不受含言訖齒啟納珠因嘘其口都無􅁾氣舉殮於棺堅直不傾委預叔祖皎為冦謙之弟子遂服氣絶粒數十年隱於常山年九十餘顔如小童一旦沐浴冠帶家人異之俄而坐卒道士咸稱其得尸解仙道李格非善論文章嘗曰諸葛孔明出師表李令伯陳情表陶淵明歸來引皆沛然如肝肺中流出殊不見有斧鑿㾗是數君子在後漢之末兩晉之間初未嘗以文章名世而其詞意超邁如此吾是以知文章以氣為主氣以誠為主故老杜謂之詩史者其大過人在誠實耳誠實著見學者多不曉如玉川子醉歸詩曰昨夜村飲歸健倒三四五摩挲青莓苔莫嗔驚著汝舒王用其意作扇子詩曰玉斧修成寶月團月邉仍有女乗鸞青冥風露非人世􅁂亂釵横特地寒仁廟朝皇族中太尉夫人一日入内再拜告帝曰臣妾有夫不幸為婢妾所惑帝怒流婢於千里夫人亦得罪居於瑶華宮太尉罰俸而不得朝經嵗方春暮夫人為詞曲名極相思令云栁烟霽色方春花露逼金莖鞦韆院落海棠漸老纔過清明嫩玉腕托香脂臉相傅粉更與誰情秋波綻處相思淚迸天阻深誠丁晉公為昭王宮使夏英公時以翰林學士為判官一日㑹宴齋宮伶人有雜手伎號藏擫者在焉丁顧夏曰古無詠藏擫詩内翰可作一首英公即席獻詩曰舞拂桃珠復吐丸遮藏巧伎百千般主公端坐無由見却被傍人冷眼看薛尚書歴典大郡其治嚴明每五鼓冠帶黎明據案决事雖寒暑無一日異也其精强如此王文正太尉氣羸多病真宗面賜藥酒一缾令空腹飲之可以和氣血辟外邪文正飲之大覺安健因對稱謝上曰此蘇合香酒也每一斗酒以蘇合香丸一兩同煑極能調五臟却腹中諸疾每冒寒夙興則飲一杯因各出數榼賜近臣自此臣庶之家皆効為之蘇合香丸盛行於時此方本出廣濟方謂之白术丸後人亦編入千金外臺治疾有殊效予於良方叙之甚詳然昔人未知用之錢文僖公集篋中方蘇合香丸註云此藥本出禁中祥符中嘗賜近臣即謂此也魏傅融有三子靈慶靈根靈越並有才力嘗謂人曰吾昨夜夢有一駿馬無堪乗者人曰何用得人乗有一人曰惟傅靈慶堪乗此馬又有􅃓一張亦無人堪引人曰惟有傅靈根堪彎此弓又有數紙文字人皆讀不能解人曰惟有傅靈越能􅄙此文靈慶後為軍主靈根為臨齊副將靈越為前軍將軍墨客揮犀卷八
