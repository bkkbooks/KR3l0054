  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0054_WYG_009-1a, image: WYG1037/WYG1037-0709a.png}
body:
  text: 墨客揮犀卷九宋彭乗撰晉張華初惠帝時中人有得鳥毛長三丈以示華華見慘然曰此謂海鳬毛也出則天下擾攘矣陸機嘗餉華鮓于時賔客滿坐華發器便曰此龍肉也衆未信之華曰試以苦酒濯之必有異既而五色光起機還問鮓主果云園中茅積下得一白魚質狀殊常以作鮓過美故以相獻武庫封閉甚宻其中忽有雉雊華曰此乃蛇化為雉也開視雉側果有蛇蜕焉吴都臨平岸崩出一石鼓搥之無聲帝以問華華曰可取蜀中桐材刻為魚形扣之則鳴矣於是如其言果聲聞數里初吴之未滅也斗牛之間嘗有紫氣道術者皆以吴方强盛未可圖也惟華以為不然及吴平之後紫氣愈明華聞豫章人雷煥妙達緯象乃要煥宿屏人曰可共尋天文知將来吉凶因登樓仰觀煥曰僕察之久矣惟斗牛之間頗有異氣華曰此何祥也煥曰寳劍之精上徹於天耳華曰君言得之吾少時有相者言吾年出六十位登三公當得寳劍佩之斯言豈效與因問曰在何郡煥曰在豫章豐城華曰欲屈君為宰宻共尋之可乎煥許之華大喜即補煥為豐城令煥到縣掘獄屋基入地四丈餘得一石函光氣非常中有雙劍弁刻題一曰龍泉一曰太阿其夕斗牛間氣不復見焉煥以南昌西山北岩下土以拭劍光芒艷發大盆盛水置劍其上視之精芒眩目遣使送一劍并土與華留一自佩或謂煥曰得兩送一張公豈可欺乎煥曰張公將受禍此劍當繫徐君墓樹耳靈異之物終當化去不永為人服華得寳劍愛之常置座側華以南昌土不如華陰赤土報煥書曰詳觀劍文乃干將也莫邪何復不至雖然天生神物終當合耳因以華陰土一斤致煥煥更以拭劍倍益精明華誅失劍所在煥卒子華為州從事持劍行經延平津劍忽扵腰間躍出墮水使人沒水取之不見劍但見兩龍各長數丈蟠縈有文章沒者懼而反湏㬰光彩照水波浪驚沸於是失劍華歎曰先君化去之言張公終合之論此其驗乎華之博物多類此唐龍圖恬静寡慾天聖中以工部郎中知洪州舟南渡徘􅆦不進或問其故荅曰職由以四月為限分遽之任得無獲趨利之譏乎踰月乃至當時仕宦者無不媿服張宗永華州人倜儻不羈善為詩寳元中以職官知建安縣時鄭州陳相尹京兆宗永嘗以事失公意公有别業在鄠杜縣間宗永知公好絶句詩乗間詣之於舎壁大書二韻云喬松翠竹絶纎埃門對南山盡日開應是主人貪報國功成名遂不歸来莊督録以聞公覽而善之待之如初宗永嘗有詩云大書文字隄防老剰買峯巒准備閑嘉句甚多往往膾炙人口舊制天下貢舉人到闕悉皆入對數不下三千人謂之羣見逺方士皆未知朝廷儀範班列紛錯有司不能繩劾見之日先設禁圍於著位之前舉人皆拜于禁圍之外盖欲限其前列也至有更相抱持以望黼座者有司患之近嵗遂止令􅄙頭入見然尚不減數百人嘉祐中予忝在解頭别為一班最在前列目見班中惟從前一兩行稍應拜起之節自餘亦終不成班綴而罷毎為閤門之累常言殿庭中班列不可整齊唯見三色謂舉人番人駱駞曹武穆知渭州號令明肅西人懾憚由是邊境無虞一日方召諸將飲食㑹有叛卒數千亡奔出境者候騎報適至諸將相視失色公言笑如平時徐謂騎曰吾命也汝無泄西人聞之以為襲已皆殺之山民云熊於山中行數千里悉有潛伏之所必在石嵓枯木中山民謂之熊館惟虎出百里外則迷不知道路楊行密之據揚州民呼蜜為蜂糖夫蜜宻二音也呼吸不同字體各異亦由茄子伽子之義甚哉南方之好避諱者如此山谷言余頃與范内翰純甫同局純甫多能言事方公初官鳳翔時年尚少家人毎毎見其臥齋中忽蹶起著公服執手板危坐久之率以為常竟莫識其意純甫常從容問之荅曰吾時忽念天下安危事夫人以天下安危為念豈可不敬邪孫之翰人嘗與一硯直三十千孫曰硯有何異而如此之價也客曰硯以石潤為賢此石呵之則水流孫曰一日呵得一擔水纔直三錢買此何用竟不受孫元規知杭州摘姦發伏號為神明有僧元夕市中然頂求化以新寺宇左右施利山積公出見立馬不行瞰其情久之入呼僧前詰其姦狀僧惶恐頓伏又一僧醉卧道上為邏者所擒公問其故僧荅曰野性所嗜不能自禁又問復能飲酒否曰公家賜酒安敢不飲遂與酒一壺一引而盡公戒邏者曰速扶師歸院勿使為羣小侵侮僧明日聲鼓登坐謂衆曰吾西院之人也溷跡於此不幸為此子聽識不可復留矣扵是結跏趺坐奄然而逝其分别淑慝皆此類也石㕘政中立性滑稽天禧中為員外郎時西域獻獅子畜於御苑日給羊肉十五斤嘗率同列往觀或曰彼獸也給羊肉乃爾吾輩忝預郎曹日不過數斤人翻不及獸乎石曰君何不知分也彼乃苑中獅子吾曹員外郎耳安可並邪趙侍讀師民學問淳徳天下所共稱也仁廟時講書後殿説乾卦四徳至貞字不以他音代呼直言其字近侍皆掩口公徐曰臨文不諱講罷帝目送之顧左右曰此真古儒也其眷重如此臨川謝逸字無逸髙才江南勝士也魯直見其詩歎曰使在館閣當不減晁張朱世英為撫州行人舉不就閒居多從衲子㳺不喜對書生一日有貢士来謁坐定曰毎欲問無逸一事輙忘之聞人言歐陽修果何如人無逸熟視久之曰舊亦一書生後甚顯達嘗㕘大政又問􅀎文章否無逸曰也得無逸之子宗野方七嵗立於旁聞之匿笑而去墨客揮犀卷九
