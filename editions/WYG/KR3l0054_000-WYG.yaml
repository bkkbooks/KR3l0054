body:
  text: 墨客揮犀小說家𩔖一雜事之屬提要臣等謹案墨客揮犀十卷宋彭乗撰案北宋時有兩彭乗一為華陽人真宗時進士官至翰林學士宋史有傳其作此書者則筠州髙安人史不載其仕履故始末無可考見書中稱嘗為中書檢正又稱至和中赴任邕州而不書其為何官又自稱嘗至儋耳其議論大抵推重蘇黄疑亦黨籍中人也陳振孫書錄解題載此書十卷續十卷稱不知撰人名氏今本為商濬刻入稗海者卷首直題彭乗姓名蓋以書中所自稱名為據而止有十卷與書錄解題卷目不合又書中如陳瑩中言後苑牧豭㹠潘大臨作滿城風雨近重陽詩彭淵材遊興國寺諸條惠洪所作冷齋夜話亦載之皆全同其文不易一字惠洪本髙安彭氏子與乗同族同時不應顯相蹈襲若此又如魏舒詣野店張華博物傅融有二子諸條皆全錄晉書北魏書原文别無考證亦不相𩔖疑所謂正續二十卷者久經闕佚此本已為後人竄亂非復振孫所見之舊特其於宋代遺聞軼事以及詩話文評徵引詳洽頗有足資參訂者故存之以為考証之一助焉乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:95c7741d08dce8a5e33ee1772ece9c865d4c4ad1640ae4500b8b034caa263e48
