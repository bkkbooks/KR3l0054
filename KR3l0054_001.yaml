body:
  text: 墨客揮犀卷一宋彭乘撰包拯自御史直諫院危言正議傾動朝野仁廟常溫顔優納近侍以為難帝曰忠鯁之言固苦口而逆耳蓋有所益也設或無益亦無所害又何必拒而責之大聖之度慈厚若此張相升為御史數上封章論及兩府仁廟因謂曰卿夲孤寒何故屢言近臣公奏曰臣安得謂之孤寒臣自布衣不數年致身清近曳朱腰金如陛下乃孤寒也帝曰何為孤寒曰陛下內無賢相外無名將官冗而失黜陟兵多而少教習孤立朝廷之上此所以孤寒也帝喜而優容之近侍皆為之懼自此名重朝野孫資政沔出帥環慶宿管城值夏州進奉使至或曰當避驛者公曰使夏國王自入朝亦外臣也猶當在某下况陪臣乎羌使遂宿白沙仁廟聞而嘉之冦萊公卒於海康詔許歸葬道出荆南之公安縣邑人迎祭於道斷竹插地以挂紙錢竹遂不根而生滋茂殆一畝邑人神之立廟於側祠宇嚴潔祀奉甚謹今侍讀王公樂道文其事於石王延政據建州令大將章某守建州城嘗遣部將某于軍前後期當斬惜其材未有以處歸語其妻其妻連氏有賢智使人謂部將曰汝法當死急逃乃免與之銀數十兩曰徑行毋顧家也部將得以活去投江南居程以疑查文徽麾下文徽攻延政部將為主是夜城將陷先喻城中能全連氏一門者有重賞連氏使人謂之曰建民無罪將軍幸赦之妾夫婦罪當死不敢圖生若將軍不惜建民妾願先百姓死誓不獨生也詞氣感慨發於至誠不得已為之戢兵而入一城獲全至今連氏為建安大族官至卿相者相踵皆連氏之後也又李景使大將胡則守江州江南未下曹翰以兵圍之三年城堅不可破一日則怒一饔人鱠魚不精欲殺之其妻遽止之曰士卒守城多年矣尸骨滿地奈何以一食殺士卒耶則乃捨之比夜卒縋城走投曹翰具言城之虛實先是城西南倚險素不設備卒乃引三帥自西南攻之是夜城陷胡則一門無遺類二人者其為德一也何其報效之不同哉王文正太尉局量寬厚未嘗見其怒飲食有不精潔者但不食而已家人欲試其量以少埃墨投羔中公但啖飯而已問其何以不食羔曰我偶不喜肉一日又墨其飯公視之曰吾今日不喜飯可具粥其子弟訴於公曰庖肉為饔人所私食肉不飽乞治之公曰汝輩人料肉幾何曰一斤今但得半斤其半為饔人所廋公曰盡一斤可得飽乎曰盡一斤固當飽曰此後人料一斤半可也其不發人過皆類此嘗宅門壞主者撤屋新之暫於廊廡下起一門以出入公至側門門低據鞍俯伏而過都不問門畢復行正門亦不問有控馬卒嵗滿辭公公問汝控馬幾時曰五年矣公曰吾不省汝既去復呼回曰汝乃某人乎於是厚贈之乃是逐日控馬但見其背未嘗視其面因去見其背方知也詩人多用方言南人謂象牙為白暗犀為黑暗故老杜詩曰黑暗通蠻貨又謂睡美為黑甜飲酒為軟飽故東坡詩曰三杯軟飽後一枕黑甜餘左傳晉使子員謂鄭人曰君有楚命亦不使一介行李告于寡人注行李謂行人也今人乃謂行裝為行李非也鄭希仲云凡仕官有三難一謂統十萬之衆而為帥二謂翰林學士三謂宰劇邑三者茍非其材則事必隳廢除是三者雖宰相猶可以常才處之冦忠愍初登第授大理評事知歸州巴東縣時唐郎中謂方為郡夕夢有人告云宰相至唐思之不聞朝廷有宰相出鎮者晨興視事而疆吏報冦廷評入界唐公驚喜出郡迓勞見其風神秀偉便以左輔待之且出諸子羅拜唐新飾勒韉置廳之左冦既歸船其子極白其父曰適者冦屢目此宜即送之冦果詢牙校何人知吾欲此對以十四秀才既而力為延譽極於孫漢榜中第由是成名世人畫韓退之小面而美髯著紗帽此乃江南韓熙載耳尚有當時所畫題志甚明熙載諡文靖江南人謂之韓文公因此遂謬以為退之退之肥而寡髯元豐中以退之從享文宣王廟郡縣所畫皆是熙載後世不復可辨退之遂為熙載矣今人於榜下擇壻號臠壻其語蓋夲諸袁嵩尤無義理其間或有意不願而為貴勢豪族擁逼不得辭者有一新後輩少年有風姿為貴族之有勢力者所慕命十數僕擁致其第少年欣然而行略不辭避既至觀者如堵須臾有衣金紫者出曰某惟一女亦不至醜陋願配君子可乎少年鞠躬謝曰寒微得托迹髙門固幸將更歸家試與妻子商量看如何衆皆大笑而散舊制三班奉職月俸錢七百驛劵肉半斤祥符中有人為題詩所在驛舍門曰三班奉職實堪悲卑賤孤寒即可知七百料錢何日富半斤羊肉幾時肥朝廷聞之曰如此何以責廉隅遂議增月俸嘗有一名公初任縣尉有舉人投書索米戲為詩答之曰五貫五百九十俸虛錢請作足錢用妻兒尚未厭糟粳僮僕豈免遭飢凍贖典贖解不曽休喫酒喫肉何曽夢為報江南癡秀才更來謁索覔甚甕熙寧中例增選人俸錢不復有五貫九百俸者此實養廉隅之本也潘閬字逍遙咸平間有詩名與錢易許洞為友狂放不羈常為詩曰散拽禪師來蹴踘亂拖遊女上鞦韆此其自序之實也後坐盧多遜黨間命捕購甚急閬乃變姓名僧服入中條山許洞密贈之詩曰潘逍遙平生志氣如天髙倚天大笑無所懼天公嗔爾口呶呶罰教臨老頭補衲歸中條我願中條山神鎮常在驅雷叱電依前趕出這老怪後會赦以助教授之官閬乃自歸送信州安置仍不懲艾復為掃市舞詞曰出秋霜價錢可嬴得撥灰兼弄火暢殺我以此為士人不齒投棄終身藏書畫者多取空名偶傳為鍾王顧陸之筆見者爭售此所謂耳鑒又觀畫而以手摸之相傳以謂色不印指者為佳畫此又在耳鑒之下謂之揣骨聽聲歐陽公嘗得一古畫牡丹叢其下有一貓永叔未知其精妙丞相正肅吳公與歐公家相近一見曰此正午牡丹也何以明之其花披哆而色燥此日中時花也貓眼黑精如線此正午貓眼也有帶露花則房斂而色澤貓眼早暮則精圓正午則如一線耳此亦善求古人之意也司馬溫公詩話曰魏野詩曰燒葉爐中無宿火讀書窗下有殘燈而俗人易葉為藥不止不佳亦和下句無氣味魯直曰老杜詩曰黃獨無苖山雪盛黃獨者芋魁小者耳江南名曰土卯南州多食之而俗人易曰黃精子美流離亦未至作道人劍客食黃精也如淵明詩曰採菊東籬下悠然見南山其渾成風味句法如生成而俗人易曰望南山一字之差遂失古人情狀學者不可不知揚州芍藥名著天下郡國最其盛處仁宗朝韓魏公以副樞出鎮維揚初夏芍藥盛開忽於叢中得黃緣稜者四朵土人呼為金腰帶云數十年間或有一二朵不常見也魏公開宴召二人者同賞時王禹玉作監郡王荆公為幕官陳秀公初校尉衛寺丞為過客其後四人者皆相繼登台輔蓋花瑞也御史臺儀凡御史上事一百日不言罷為外官有侍御史王平拜命垂滿百日而未言事同寮皆訝云或曰王端公有待而發茍言之必大事也一日聞入劄子衆共偵之乃彈御膳中有髮其彈詞云是何穆若之容忽覩鬈如之狀墨客揮犀卷一
