body:
  text: 墨客揮犀卷十宋彭乘撰郭進有才略纍有戰功嘗判邢州今邢州城乃進所築其厚六丈至今堅完鎧仗精巧以至封貯亦有法度進於城北治第既成聚族人賔客落之下至土木之工皆與燕設諸工之席于東廡人或曰諸子安可與工徒齒進指諸工曰此造宅者指諸子曰此賣宅者固宜坐造宅者下也進死未幾果為他人所有今資政殿學士陳彥升宅乃進舊第東一隅也孫夢得中丞薦吳中復為御史或曰公平生不識何由知之公曰抃聞中復知犍為縣多美政及替不載一物其愛民亷潔如此使之立朝必不茍且知賢則薦何用識面邪包樞密知府禮上日衆吏前請諱公曰何諱也吏曰公祖先之名羣吏當避之公瞋目曰吾無所諱惟諱吏之有贓汚者吏懼而引去吁公儒者之通敏者也任府尹十餘年民吏稱為神明然為大尹十餘年近世亦稀有興化𨼆士陳易字體常熙寧初在太學通經術既而𨼆居廬山以歸乃築室于興化縣之蔡溪嵓不下山者三十年惟與沙門有需親善人或就見亦無忤也易襟抱易曠風韻灑然見者無不愛慕忘歸蔡子由正言首以八行薦之易以啓事謝之云心若死灰枉被吹噓之力身如槁木難施雕琢之功又云昔在儒門雖粗修於八行晚歸祖道惟務了於一心心既已忘行復何有其所造如此其後轉運判官陳達野復以行䏻尤異薦易於朝易終不起黃州潘大臨工詩多佳句然貧甚東坡山谷尤喜之臨川謝無逸以書問有新作否潘答書曰秋來景物件件是佳句恨為俗氣所蔽翳昨日清卧聞攪林風雨聲欣然起題其壁曰滿城風雨近重陽忽催租人至遂敗意止此一句奉寄聞者笑其迂濶初作東府望氣者言曰異哉乃有天子氣及府成車駕果臨幸時龍圖張秩以詩慶兩府諸公而王丞相和曰曽留主上經過迹更費多人賦詠才王荆公患喘藥用紫團山人參不可得時薛師政自河東還適有之贈公數兩不受人有勸公曰公之疾非此藥不可治疾可憂藥不足辭公曰平生無紫團參亦活到今日竟不受公面黧黑門人憂之以問醫人曰此垢汙非疾也進澡豆令公洗面公曰天生黑於豫澡豆其如豫何王相有邊功久居樞要仁廟朝有諫官言公宅枕乾剛貌類藝祖公上章請罪云宅枕乾剛乃朝廷所賜貌類藝祖蓋父母所生仁廟嘉納益厚遇公言者內愧夫言事諫官之職也然貴得其實則不曠茍求其微過以邀名非義也况無過失乎羅可沙陽之碩儒也性度寬宏詞學贍麗嘗預鄉薦見黜於禮部遂慨然不復有進取意以疏放自適鄉人共以師禮事焉人有竊刈其園中蔬者可適見因躡足伏草間避之以俟其去又有攘殺其雞者可乃攜壺就之其人慙悚服罪可執其手曰與子幸同里閭不能烹雞以待子我誠自愧乃設席呼其妻孥環坐盡醉而歸終不以語人人由是相誡無犯年六十七而卒所為詩賦多播人口嘗作百韻雪詩其間有斜侵潘嶽鬢橫上馬良眉誠佳句也杜甫贈髙適詩云脫身簿尉中始與捶楚辭韓愈贈張工曹詩云判司卑官不堪說未免捶楚塵埃間杜牧寄小姪阿宜詩云參軍與簿尉塵土驚羌勷一語不中治鞭捶身滿瘡以此明唐之參軍簿尉有過則受笞杖之刑猶今之胥吏也西頭供奉官錢昭度粗有詩名曽作詠方池詩云東道主人心匠巧鑿開方石貯漣漪夜深却被寒星照恰似仙翁一局碁有輕薄子見而笑曰此正所謂一局黑全輸也前輩作花詩多用美女比其狀如曰若教解語應傾國任是無情也動人陳俗哉山谷作酴醿詩曰露濕何郎試湯餅日烘荀令炷爐香乃用美丈夫比之若將出類而吾叔淵材作海棠詩又不然曰雨過溫泉浴妃子露濃湯餅試何郎意尤工也趙叔平罷參政致政居睢陽歐陽永叔罷參政致政居汝陰叔平一日乘女輿來訪永叔時呂晦叔以金華學士知潁州啓宴以召二公于是歐公自為優人致語及口號髙誼清才搢紳以為美談口號曰欲知盛集繼荀陳謂有當筵主與賔金馬玉堂三學士清風明月兩間人紅芳已過鶯猶囀青杏初嘗酒正醇好景難逢良㑹少乘歡舉白莫辭頻趙閲道為成都轉運使出行部內唯攜一琴一鶴一龜坐則看龜鼓琴嘗過青城山遇雪舍于逆旅逆旅之人不知其使者也或慢狎之公頽然鼓琴不顧治平年江南吉州吉水令忘其名治邑以嚴毅民有罪大小不赦邑雖治民亦失和有野客馬道為啄木鳥詩云翠翎迎日動紅觜響烟蘿不顧泥丸及惟貪得食多才摧枯朽木又止最髙柯吳楚園林濶茫茫爭奈何令見其詩為之少緩民目馬君為馬啄木俗語有之曰槐花黃舉子忙謂槐之方花乃進士赴舉之時而唐詩人翁承贊有詩云雨中粧㸃望中黃勾引蟬聲送夕陽憶得當年隨計吏馬蹄終日為君忙乃知俗語亦有所自也盧秉侍郎嘗為江南小郡司户參軍於傳舍中題詩云青衫白髮病參軍旋糶黃粱換酒樽但得有錢留客醉也勝騎馬傍人門王荆公過而見之尤極稱賞俄薦於朝數年間遂超顯仕東坡曰羅浮有野人山中𨼆者或見之相傳葛稚川之𨽻也有鄧道士者嘗見其足跡余偶讀韋蘇州寄全椒道士詩云今朝郡齊冷忽念山中客澗底束荆薪歸來煮白石遙持一樽酒逺慰風雨夕落葉滿空山何處尋行迹想其風度則全椒道士豈亦鄧君之流乎因以酒問且依蘇州韻作詩寄之曰一杯羅浮春逺餉採薇客遙知獨酌罷醉卧松下石幽人不可見清嘯聞月夕聊戲庵中人飛空本無跡楊某尚書以耳聾致政居鄠縣别業同里有髙氏者資頗厚有二子小字大馬小馬者業明經屢上謁楊以里閈之故雖庸下常待以溫顔一日里中社小馬攜酒一榼就楊公曰此社酒善治聾願得侍杯杓之餘瀝楊瞑目良久呼小僕取箋書絶句與之曰十數年來聾耳瞶可將社酒便能醫一心更願清盲了免見豪家小馬兒晏元獻公為童子時張文節薦之於朝廷召至闕下適值鄉試進士便令公就試公一見試題曰臣十日前已作此賦草尚在乞别命題上極愛其不𨼆及為館職時天下無事許臣寮擇勝燕飲當時侍從文館士人大夫為燕集以至市樓酒肆往往皆供帳為遊息之地公是時貧甚不能出獨家居與昆弟講習一日選東宫官忽自中批除晏殊執政莫諭所因次日進覆上諭之曰近聞館閣臣寮無不嬉逰燕賞彌日繼夕惟殊杜門與兄弟讀書如此謹厚正可為東宫官公既受命得對上面諭除授之意公語言質野則曰臣非不樂燕遊者直以貧無可為之臣若有錢亦須往但無錢不能出耳上益嘉其誠實知事君體眷注日深仁廟朝卒至大用陳亞大卿性尤俊逸好諧謔其語士大夫共轉道聞者笑吃吃不止今見其詩如浪平天接影山盡樹回身之句皆深得作者之格古人有洗竹詩獨公有惜竹詩云出檻亦不剪從教長瘦叢年年當盛夏葉葉是清風句清格老皆此類郭祥正字功甫有逸才詩多新意丞相荆公過金山寺于壁間得長篇讀之反覆諷味問知功甫所為由此見重最愛其兩句云鳥飛不盡暮天碧漁歌忽斷蘆花風又曽題人山居一聮云謝家莊上無多景只有黃鸝三兩聲公乃命工繪為圖自題其上云此是功甫題山居詩處即遣人以金酒鍾并圖遺之唐人詩云嫩緑枝頭紅一㸃動人春色不須多不記作者名字鄧元孚待制曽見舒王親書此兩句于所持扇上或以為舒王自作非也東坡夜宿曹溪借傳燈録讀燈花墮卷上燒一僧字即以筆記於窗間云曹溪夜岑寂燈下讀傳燈不覺燈花落茶毗一箇僧墨客揮犀卷十
