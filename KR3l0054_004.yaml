body:
  text: 墨客揮犀卷四宋彭乘撰熙寧中髙麗遣使求入貢且求王平甫學士京師題詠有㫖令權知開封府尤厚之內翰抄録以賜時厚之自詣平甫求新著平甫以詩戲厚之曰誰使詩仙來鳳沼欲傳賈客過雞林舒王性酷嗜書雖寢食問手不釋卷晝或宴居默坐研究經㫖知常州對客語未嘗有笑容一日大㑹賔佐倡優在庭公忽大笑人頗怪之乃共呼優人厚遺之曰汝之藝能使太守開顔其可賞也有一人竊疑公笑不由此因乘間啓公公曰疇日席上偶思咸恆二卦豁悟微旨自喜有得故不覺發笑耳世謂太守為五馬人罕知其故事或言詩云孑孑干旟在浚之都素絲組之良馬五之鄭注謂周禮州長建旟漢太守比州長法御五馬故云後見龎幾先朝奉云古乘駟馬車至漢時太守出則增一馬事見漢官儀也古者三公開閣郡守比之古侯伯亦有閣所以世之書題有閣下之稱前輩呼刺史太守亦曰節下與宰相大僚書往往呼執事言閣下者少劉子𤣥為史官與監修宰相書呼足下韓文公與使主張僕射書呼執事即其例也記室賔佐也他人亦非所宜執事則指斥左右之人尊卑皆可通用侍者士庶盡可用之近日官至使府御史及畿令悉呼閣下至于初命賔佐猶呼記室今則一例閣下可謂上下無别矣其執事才於舉人侍者止行于釋子而已今之布衣相呼盡曰閣下雖出于浮薄相戲亦是名分大壞矣又中表疏逺卑行多有座前之目尤可懲怪夫閣下去殿下一階座前降几前一等此之乖僭其可行耶宗從叔諸姑及姨舅行施之可也栁如京開知蔡州有監兵錢供奉者亦忠懿之近屬也乃父方奉朝請在京師開乘間來謁造其書閣見壁有繪婦人像甚美詰以誰氏監兵對曰某之女弟也既笄矣栁喜曰開喪偶已踰期願取為繼室錢曰俟白家君敢議姻事栁曰以開之才學不辱于錢氏之門遂强委禽焉不旬日遂成禮錢不之敢拒走介白其父遂乞上殿面訴栁開劫取臣女仁宗問曰識栁開否不識謂曰真竒傑之士也卿家可謂得佳壻矣吾為卿媒可乎錢父不敢再言但拜謝而退陳瑩中為豫言神宗皇帝一日行後苑見牧猳㹠者問何所用牧者對曰自祖宗以來長令畜之自稚養之以至大則殺之必養其稚者前朝不敢易爾不知果安用神宗沈思久之詔付有司禁中自今不得復畜數月衛士忽獲妖人急欲血澆之禁中卒不能致神宗方悟太祖逺略亦及此舒王在鍾山有道士來謁因與碁輒作數語曰彼亦不敢先此亦不敢先惟其不敢先是以無所爭惟其無所爭故能入於不死不生舒王笑曰此持碁𨼆語也東坡作海棠詩曰只恐夜深花睡去更燒銀燭照紅粧事見太真外傳曰上皇登沈香亭詔妃子妃子時卯醉未醒命力士使侍兒扶掖而至妃子醉顔殘粧鬢亂叉橫不能再拜上皇笑曰是豈妃子醉真海棠睡未足耳作仙童詩曰故將白練作仙衣不許紅膏汚天質事見則天長夀二年詔書曰應天下尼用白練為衣作橄欖詩曰待得微甘回齒頰已輸崖蜜十分甜崖蜜事見鬼谷子曰照夜清螢也百花醴蜜也崖蜜櫻桃也作僧峯子詩曰平生萬事足所缺惟一死事見梁僧史曰世祖宴東府王公畢集詔跋陀羅至跋陀羅皓然清癯世祖望見謂謝莊曰摩訶衍有機辨當戲之跋陀羅趨外陛世祖曰摩訶衍不負逺來唯有一死在即應曰貧道客食陛下三十載恩德厚矣無所缺所缺者只一死耳蜀路泥溪驛天聖中有女郎盧氏者隨父往漢州作縣令替歸題于驛舍之壁其序略云登山臨水不廢于謳吟易羽移商聊舒於羇思因成鳳棲梧曲子一闋聊書于壁後之君子覽之者毋以婦人竊弄翰墨為罪詞曰蜀道青天烟靄翳帝里繁華迢遞何時至回望錦川揮粉淚鳳叉斜軃烏雲膩細𢃄雙垂金鏤細玉佩玎璫露滴寒如水從此鸞粧添逺意畫眉學得遙山翠大庾嶺上有佛祠嶺外往來題壁者鱗比有婦人題云妾幼年侍父任吳州司寇既代歸父以大庾本曰梅嶺之號今蕩然無一株遂市三十夲植于道之左右因留詩于寺壁今隨夫任端溪復至此寺詩已為杇鏝者所覆即命墨于故處詩曰滇江今日掌刑回上得梅山不見梅輟俸買栽三十樹清香留與雪中開好事者因此夾道植梅多矣杜牧華清宫詩云長安回望繡成堆山頂千門次第開一騎紅塵妃子笑無人知道荔枝來尤膾炙人口據唐紀明皇以十月幸驪山至春即還宫是未嘗六月在驪山也然荔枝盛暑才熟詞意雖美而失事實矣李翰林作襄陽歌云清風明月不用一錢買玉山自倒非人推人皆推為佳句至歐陽文忠公題蘇子美滄浪亭詩乃云清風明月本無價可惜只賣四萬錢二人致詞雖異然皆善談風月者也張端公伯玉大科成名篇什豪邁尤為清脫過姑孰見李太白十咏嘆美久之周流泉石間後見一水清激詢地人曰此水名明月泉公曰太白不題此泉將留以待我也公有詩曰至今千丈松猶伴數岩雪不見纎塵飛寒泉皓明月子瞻常自言平生有三不如人謂著碁喫酒唱曲也然三者亦何用如人子瞻之詞雖工而多不入腔正以不能唱曲耳蔡君謨善别茶後人莫及建安能仁院有茶生石縫間寺僧採造得茶八餅號石嵓白以四餅遺君謨以四餅密遣人走京師遺王內翰禹玉嵗餘君謨被召還闕訪禹玉禹玉命子弟于茶笥中選取茶之精品者碾待君謨君謨捧甌未嘗輒曰此茶極似能仁石嵓白公何從得之禹玉未信索茶貼驗之乃服王荆公為小學士時嘗訪君謨君謨聞公至喜甚自取絶品茶親滌器烹㸃以待公兾公稱賞公于夾袋中取消風散一撮投茶甌中併食之君謨失色公徐曰大好茶味君謨大笑且歎公之真率也有小兒夜戲溪傍見星墜視之得一石圓如雞卵因攜以歸是夕其家大火明日棄于道上為一士人所得經數夕又火遂還棄溪中夜將半復化為流星而去荆公禹玉熙寧中同在相府一日同侍朝忽有虱自荆公襦領而上直緣其鬚上顧之笑公不自知也朝退禹玉指以告公公命從者去之禹玉曰未可輕去輒獻一言以頌虱之功公曰如何禹玉笑而應曰屢逰相鬚曽經御覽荆公亦為之解頤館閣新書淨本有悮書處以雌黃塗之嘗校改字之法刮洗則傷紙紙貼之又易脫粉塗則字不沒塗數遍方能漫滅惟雌黃一漫則滅仍久而不脫古人謂之鉛黃蓋用之有素矣賈魏公為相日有方士姓許對人未嘗稱名無貴賤皆稱我時人謂之許我言談頗有可採然傲誕視公卿蔑如也公欲見使人邀之數四卒不至又使門人苦邀致之許騎驢徑欲造丞相㕔事門吏止之不可吏曰此丞相㕔門雖丞郎亦須下許曰我無所求于丞相丞相召我來若如此但須我去耳不下驢而去門吏急追之不還以白丞相魏公又使人謝而召之終不至公歎曰許市井人耳惟其無所求于人尚不可以勢屈况其以道義自任者乎墨客揮犀卷四
