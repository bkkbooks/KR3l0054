  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0054_WYG_003-1a, image: WYG1037/WYG1037-0683a.png}
body:
  text: 墨客揮犀卷三宋彭乘撰虎每食一人則耳成一缺汀洲西山有虎為暴十餘年後為射者所殺兩耳如鋸焉又人言虎怪甚靈不妄食人邅其患者蓋命所值或是宿寃也武康民朱泰事母甚孝嘗為虎所摶負之而去泰大呼曰虎暴殺我我母將無所依虎遽棄于地驚竄入山泰後安健如故鄉人號為朱虎殘歐陽文忠公好推挽後學王向少時為三班奉職勾當滁州一鎮時文忠守滁州有先生為學子不行束修自往詣之學子閉門不接先生訟於向向判其牒曰禮聞來學不聞往教先生既已自屈弟子寧不少髙盍二物以收威豈兩辭而造致先生不喜向判徑持牒以見歐公公一閲大稱其才遂為之延譽奬進成就美名卒為聞人蜀人魏野隱居不仕宦喜為詩以詩著名卜居陕州東門之外有陕州平陸縣詩云寒食花藏縣重陽菊繞灣一聲離岸櫓數點别州山最為警句所居頗瀟灑當世顯人多與之逰寇忠愍尤愛之嘗有贈忠愍詩云好向上天辭富貴却來平地作神仙後忠愍鎮北都召野坐門下北都有妓女美色而舉止生硬士人謂之生張八因府會忠愍令乞詩于野野贈之詩曰君為北道生張八我是西州熟魏三莫怪樽前無笑語半生半熟未相諳吳正憲憶陜郊詩云南郭迎天使東郊招隱人隱人謂野而野有子名間亦有清譽今尚居陜州慶厯中范希文以資政殿學士判邠州豫中途上謁翌日召食時李郎中丁同席范與丁同年進士也因道舊日某修學時最為貧窶與劉某同在長白山僧舍日惟煮粟米二升作粥一器經宿遂凝以刀為四塊早晚取二塊斷虀十數莖醋汁半盂入少鹽暖而啖之如此者三年鍾弱翁所至好貶剝榜額字畫必除去之出新意自立名令具牌當為重書之鏤刻工匠十數輩然字畫不工人皆苦之嘗經過廬陵一山寺有髙閣壯麗弱翁與僚屬部曲擁立望其榜曰定惠之閣字徑八寸旁題姓名漫滅弱翁放意稱謬使僧呼梯取之拭拂視之乃魯國顔真卿書弱翁顧謂客曰似此字畫何不刻石即令刻石傳者以為笑漳州漳浦縣地連潮陽素多象往往十數為羣然不為害惟獨象遇之逐人蹂踐至肉骨糜碎乃去蓋獨象乃衆象中最獷悍者不為羣象所容故遇之則蹂而害人僧悟空在江外見一猿坐樹杪弋人伺其便射之正中母腹母呼其雄至付子已哀鳴數聲乃拔箭墮地而死射者折矢棄弓誓不復射貉行十數步輒睡以物擊竹警之乃起既行復睡性嗜紙狀如毛質滑膩可愛豫元符中于京師賣藥翁處見之蔣堂侍郎為淮南轉運使日屬縣例致賀冬至書皆投書即還有一縣令投書人獨不肯去須索回書左右諭之皆不聽以至呵逐亦不去曰寧得罪不得書不敢回邑時蘇子美在坐頗駭怪曰皂𨽻如此野狼其令可知蔣曰不然此必健者能使人不敢慢其命如此乃為一簡答之方去子美歸吳中月餘得蔣書曰縣令果健者遂延譽後卒為名臣或云天章閣待制杜杞也國子博士李餘慶知常州強于政事果于去惡凶人惡吏畏之如神末年得疾甚困有州醫博士多過惡常懼為餘慶所發因其困進利藥以毒之服之洞泄不已勢已危餘慶察其姦使人扶舁坐廳事召醫博士杖殺之然後歸臥未及席而死葬于橫山人至今畏之過墓者皆下馬有病瘧者取墓土著牀席間輒差其敬憚之如此石守道學士為舉子時寓學於南都其固窮苦學世無比者王侍郎獨聞其勤約因會客以盤餐遺之石謝曰甘脆者亦某之願也但日享之則可若止修一餐則明日何以繼乎朝享膏粱暮厭粗糲人之常情也某所以不敢當賜使以食還王益重之白樂天每作詩令一老嫗解之問曰解否嫗曰解則録之不解則又復易之故唐末之詩近于鄙俚也蛟之狀如蛇其首如虎長者至數丈多居溪潭石穴下聲如牛鳴岸行或溪谷者時邅其患見人先以腥涎繞之既墜水即於腋下吮其血血盡乃止昔有舟人為蛟所毒但見于水上嘻笑而入明日尸出兩腋下有穴如杯焉小説言漢武帝曽得蛟作鮓甚美又周處亦曽殺蛟然此物似神通人或見其首尾能殺者亦少余伯祖嘗於野外見蜈蚣逐一大蛇甚急蛇奔過一溪蜈蚣亦隨之蛇知力屈不免乃回身張口向之蜈蚣遽入其口俄頃蛇死乃穴其腹傍而出拆蛇視之已無腸矣傳言蝍蛆甘𢃄蝍蛆蜈蚣之别名蝸牛不特能伏蝎亦能制蜈蚣蜈蚣見蝸牛則不復能去蝸徐登其背以涎繞之其足盡落林逋隱居杭州孤山常畜兩鶴縱之則飛入雲霄盤旋久之復入籠中逋常泛小艇逰西湖寺時有客至逋所居則一童子出應門延客坐為開籠縱鶴良久逋必棹小船而歸蓋常以鶴飛為驗也逋髙逸倨傲多所學惟不能棊常謂人曰逋世間事皆能之惟不能擔糞與著棊邊城守具中有戰棚以長木抗于女牆之上大體類敵樓可以離合設之頃刻可就以備倉卒城樓摧壞或無樓處受攻則急張戰棚以臨之梁侯景攻臺城為髙樓以臨城上亦為樓以拒使壯士仗槊鬬于樓上亦近此類預備敵人非倉卒可致近嵗邊城有議以謂既有敵樓則戰棚悉可廢者恐講之未熟也鞠真卿守潤州民有鬬毆者本罪之外别令先毆者出錢以與後應者小人靳財兼不憤輸錢于他人終日紛爭相視無敢先下手者王雱丞相荆公之次子也取撫州龎氏踰年生一子雱素有心疾至是與其妻不睦丞相念婦之無罪遂離而嫁之是時侯叔獻死而其妻隗氏幃箔不修丞相表其事而斥去時有唁語曰王太祝生前嫁婦侯工部死後休妻東野下第詩曰出門如有礙誰云天地寬晚登第乃作詩曰春風得意馬蹄疾一日看盡長安花夫名利之重輕人所不能免東野尤甚物有異類交者孔雀與蛇交蚯蚓與人斯交南方溪澗中有魚生石上號石班魚作鮓甚美至春含育則有毒不可食云與蜥蜴交也舊説見龜蛇集者有印綬之喜博物志云龜純雌無雄與蛇交通而生子列子亦謂純雌其名大腰今有遇龜蛇集者皆以謂真武降必焚香罄誠懇禱而未嘗獲福蓋蔽于流俗而不究此説也熙寧中京師久旱按古法令坊巷各以大甕貯水插栁枝泛蜥蜴使青衣小兒環繞呼曰蜥蜴蜥蜴興雲吐霧降雨滂沱放爾歸去開封府準堂劄責坊巷等觀祈雨甚急而不能盡得蜥蜴往往以蝎虎代之蝎虎入水即死無能神變者也小兒更其語曰寃苦寃苦我是蝎虎似憑昏昏怎得甘雨墨客揮犀卷三
