  - {type: page-break, offset: 0, content: '', id: KR3l0054_WYG_007-1a, image: WYG1037/WYG1037-0700a.png}
body:
  text: 墨客揮犀卷七宋彭乘撰禮部貢院試進士日設香案于階前主司與舉人對拜此唐故事也所坐設位供帳甚盛有司具茶湯飲漿至試學究則悉徹帳幕氊席之類亦無茶湯渴則飲硯水人人皆黔其吻非故欲困之乃防氊幕供應人私傳所試經義蓋嘗有敗者故事為之防歐陽文忠有詩焚香禮進士撤幕待經生以為禮數輕重如此其實自有為楊大年內翰七嵗對客談論有老成風年十一太宗皇帝聞其名召對便殿授祕書省正字且謂曰卿久離鄉里得無念父母乎對曰臣見陛下一如臣父母上歎賞久之杜學士鎬博聞强記凡有撿閲先戒小吏某事在某書第幾行取視無差士大夫有所著撰多以古事詢之無不知者雖晚學卑品亦應答不倦時人號為杜萬卷性和易有懿行士君子推之西洛有五相宅常有五相鄰居詩賡相繼和乃文潞公富相王相二張相也伊洛山水之秀士風之厚自昔卿相間出故諺云吾鄉有宰相坊侍郎里華亭船子和尚有偈曰千尺絲綸直下垂一波才動萬波隨夜盡水寒魚不食滿船空載月明歸叢林盛傳想見其為人山谷倚曲音歌成長短句曰一波才動萬波隨蓑笠一鈎絲金鱗正在深深處千尺也須垂吞又吐信還疑上鈎遲水寒江靜滿目青山載月歸崔刑部樞夫人太尉西平王女也西平生日中堂大宴方食有小婢附崔氏女耳語久之崔女頷之而去有頃復至王問曰何事女對曰大家昨夜小不安適使人往候王擲箸怒曰我不幸有此女大竒事汝為人婦豈有阿家體候不安不檢校湯藥而與父作生日吾有此女何用作生日為遽遣走檐子歸身亦續至崔氏家問疾且拜謝教訓子女不至姻族聞之無不愧赧故李夫人婦德克備治家整肅貴賤皆不許時世粧梳勳臣之家特數西平禮法參政趙侍郎宅在東京麗景門內後致政歸睢陽舊第東門之宅更以為客邸而材植雄壯非他可比時謂之無比店李給事師保釐西京時駝馬市有人新構酒樓李乘馬過其下悅其壯麗忽大言曰有巴時人對曰酒苑叔平無比店洛中君錫有巴樓除拜官職謂除拜舊籍不然也除猶易也以新易舊曰除如新舊嵗之交謂之嵗除易除戎器戒不虞以新易弊所以備不虞也階謂之進以自下而上亦更易之義崔堅白侍郎口不談人之過淡於勢利祥符中掌右史者幾十年每立殿墀上常自退匿慮上見之精易𧰼善鼓琴所僦舍有小閣手植竹數竿朝退默坐其上翛然獨酌以自適韓魏公知北都有中外親獻玉盞一隻云耕者入壞塜而得表裏無纎瑕可指真絶寶也公以百金答之尤為寶玩乃開醇召漕使顯官特設一卓覆以繡衣致玉盞其上且將用之將酒遍勸坐客俄為吏將誤觸臺倒玉盞俱碎坐客皆愕然吏將伏地待罪公神色不動笑謂坐客曰物破亦自有時謂吏將曰汝誤也非故也何罪之有公之量寬大重厚如此有人說李寰建節晉州表兄武恭性誕妄又稱好道及蓄古物遇寰生日無餉乃遺箱挈一故皂襖子與寰云此是李令公收復京師時所服願尚書功業一似西平寰以書謝後聞知恭生日箱挈一破膩脂幞頭餉恭曰知兄深慕髙真求得一洪崖先生初得仙時幞頭願兄得道一如洪崖賔寮無不大笑李侍郎性清介簡重知杭州惡其俗輕靡不事遊燕一日微雪遽命出郊衆謂當召賔朋為髙㑹乃獨訪林逋處士清談至暮而歸任中未嘗買物及去惟市白樂天集一部而已丞相龎公初登第為郡掾㑹郡守性褊急好責人小禮常令掾屬羅拜庭下而已坐受之衆皆忿耻竊罵公獨處之自若公曽以疾在告月餘方出例當庭參偶是日大雨守乃命張傘布茅於庭下使公設拜起唯謹此亦公逺到之量也少保歐陽公永叔在政府將求引去先一詩寄潁隂隱士常秩其略曰笑殺汝隂常處士十年騎馬聽朝雞及公致仕還潁有詩贈秩曰賴有東鄰常處士披蓑戴笠伴春鋤既而王丞相介甫秉政遂以右正言直史館召秩而秩遂起先是歐公既致政凡有賔客上謁率以道服華陽巾便坐延見至是秩授官來謝公乃披衣束帶正寢見之明年秩拜侍講判國子監尋有無名子改前詩作秩寄歐公詩曰笑殺汝隂歐少保新來處士聽朝雞又曰昔日潁隂常處士却來馬上聽朝雞有僧法名無夢自云鄂州人多化府畿村落間手持木牌一面正書詩二首云身為車兮心為軾車動軾隨何計息交梨火棗是誰無自是不除荆與棘又云身為客兮心為主主人平和客安堵若還主客不康寧精神管定辭君去後至封丘縣富固村曰此一片地可以寄吾身乃坐化鄉人共蓋堂以庇之其髮每月生一二寸則人為剃之後為一婦人以手摸而觸之即不復生人有疾者往請藥即有藥墮器中服之多愈其真身儼然面色紅潤必有道者也退之有詩贈同遊者喚起窗全曙催歸日未西無心花裏鳥更與盡情啼魯直曰余兒時每哦此詩而了不解其意自出陜右吾年五十八矣時春晚偶憶此詩方悟喚起催歸二禽名也名不虛設人故不覺耳古人於小詩用意精深如此况其大者乎蓋其學問淵源有五石六鷁之㫖催歸子規也喚起聲如絡緯圓轉清亮偏於春晚鳴江南謂之春喚海州士人李慎言嘗夢至一處水殿中觀宫女戲毬山陽蔡繩為之傳說其事甚詳有拋毬曲十餘闋詞皆清麗今獨記兩闋侍燕黃昏晚未休玉階夜色月如流朝來自覽承恩醉笑倩旁人認繡毬堪恨隋家幾帝王舞䄄揉盡繡鴛鴦如今重到拋毬處不是金爐舊日香常秩舊好治春秋凡著書講解僅數十卷自謂聖人之意皆在是矣及詔起而王丞相介甫不好春秋遂盡諱所學熙寧六年兩河荒歉有㫖令所在散苖本錢權行倚閣三年人戲秩曰公之春秋亦權倚閣乎秩色頗赭滑州韋城縣有廟曰龍王廟中有井曰豢龍井其泓澄人莫敢汲汲則井有怪不然水且沸汲者病圗經曰春秋時周侯治滑病日久不愈醫者曰當得龍肝治之乃平復捨此不可治周侯詢左右皆曰龍蟠韋城池中嵗旱民禱皆有應屠而取其肝可矣侯下令俾人取之是日驚雷怒風化作龍由南而去衝其城缺補之復壞如故慶厯年有知縣門客馬存秀才因醉入廟乃以礫投井試其靈異俄有金雀自井底飛出至井口化為烈焰存鬚髮俱爇盡無孑遺臥病嵗餘方愈謝諫議名知人喜引薦下吏知襄州日待鄧城知縣張逸特厚將薦之朝乃先設几案庭中置章其上望闕焚香再拜曰老臣為朝廷得一能吏乃封上之逸後官至樞密直學士纍典大郡皆有能名公性端直奉道及病盥沐衣逸士服怡然坐逝國朝置天文院於禁中說漏刻觀天臺銅渾儀皆如司天監與司天監互相檢察每夜天文院具有無謫見雲物禎祥及當交星次須令於皇城門未發前到禁中門發後司天占狀方到以兩司奏狀對勘以防虛僞近嵗皆是隂相計㑹符同寫奏習以為常其來已久中外具知之不以為怪其日月五星行次皆只據小厯所算躔度謄奏不曾占候有司但備員安祿而已熙寧子領太史嘗按發其欺官者六人未幾其弊復如故東坡在惠州盡和淵明詩時魯直在黔南聞之作偈云子瞻謫海南時宰欲殺之飽喫惠州飯細和淵明詩淵明千載人子瞻百世士出處固不同風味亦相似尋又遷儋州久之天下傳聞子瞻已仙去矣後七年北歸時章丞相方貶雷州東坡至南昌府太守葉公祖洽問曰世傳端明已歸道山今尚爾游戲人間邪坡曰途中見章子厚乃回反耳墨客揮犀卷七
